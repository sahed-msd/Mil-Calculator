<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>মিল ক্যালকুলেটর | অটো মোড</title>
    <!-- html2canvas (stable) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* বেস স্টাইল - উভয় ভার্সনের জন্য সাধারণ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b263b;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        /* ===== ডেস্কটপ ভার্সন (ডিফল্ট) ===== */
        .desktop-mode {
            width: 100%;
            max-width: 1300px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            margin: 25px 20px;
            padding: 35px 35px;
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        /* ===== অ্যান্ড্রয়েড ভার্সন ===== */
        .android-mode {
            width: 100%;
            max-width: 480px;
            background: #f8faff;
            border-radius: 32px 32px 0 0;
            margin-top: auto;
            padding: 22px 18px 30px 18px;
            box-shadow: 0 -15px 35px rgba(0, 0, 0, 0.3);
            border-top: 4px solid #ffb84d;
        }

        /* হেডার - ডেস্কটপ */
        .desktop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px dashed #31699e;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .desktop-header h1 {
            color: #0c3253;
            font-size: 2.8rem;
            font-weight: 800;
        }
        .about-link {
            background: #ffb347;
            color: #0e263b;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            border: 2px solid #ffe29c;
            transition: 0.2s;
        }

        /* হেডার - অ্যান্ড্রয়েড */
        .android-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .android-header h1 {
            color: #10355e;
            font-size: 1.9rem;
            font-weight: 700;
        }
        .android-chip {
            background: #ffb84d;
            color: #122b41;
            padding: 8px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: 2px solid #ffeac2;
        }

        /* ===== সাধারণ উপাদান (উভয় মোডে কাজ করবে) ===== */
        .input-card {
            background: white;
            border-radius: 28px;
            padding: 20px 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0, 20, 40, 0.1);
            border: 1px solid #d7e5ff;
        }

        .desktop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .android-flex {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-field {
            width: 100%;
        }
        .input-field label {
            display: block;
            font-weight: 600;
            color: #103f6b;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .input-field input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #b0caf5;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
            outline: none;
        }
        .input-field input:focus {
            border-color: #1a5cb0;
            box-shadow: 0 0 0 3px rgba(26,92,176,0.2);
        }

        /* অ্যাড মেম্বার */
        .add-card {
            background: #dcebff;
            border-radius: 28px;
            padding: 20px 18px;
            margin-bottom: 20px;
        }
        .add-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #103b66;
            margin-bottom: 18px;
        }
        .member-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .member-input {
            flex: 1 1 150px;
        }
        .member-input label {
            font-weight: 600;
            color: #0a2e51;
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: block;
        }
        .member-input input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 40px;
            border: 2px solid #adc6f0;
            background: white;
            font-size: 1rem;
        }
        .add-button {
            background: #134579;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #9abdf7;
            white-space: nowrap;
        }

        /* কন্ট্রোল বার */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }
        .title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .title-group h2 {
            color: #102f50;
            font-size: 1.8rem;
        }
        .clear-btn {
            background: #c93e4e;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 22px;
            font-weight: bold;
            cursor: pointer;
        }
        .download-btn {
            background: #1d6e41;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 3px solid #b0e6b0;
        }

        /* ===== আউটপুট এরিয়া (সবার জন্য একই) ===== */
        #outputArea {
            background: white;
            border-radius: 32px;
            padding: 25px 20px;
            border: 3px solid #bdd6ff;
            margin: 20px 0;
        }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 24px;
            background: #edf4ff;
            padding: 6px;
            margin-bottom: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            font-size: 1rem;
            min-width: 600px; /* সব ডিভাইসে পুরো টেবিল নিশ্চিত */
        }
        th {
            background: #0e3b70;
            color: white;
            padding: 16px 8px;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            padding: 14px 8px;
            border-bottom: 2px solid #dae6ff;
            color: #11212e;
            text-align: center;
            white-space: nowrap;
        }

        /* সমষ্টি কার্ড */
        .summary-card {
            background: linear-gradient(115deg, #082b4a, #1b4e7a);
            border-radius: 28px;
            padding: 22px 20px;
            color: white;
        }
        .summary-card h3 {
            color: #ffda99;
            font-size: 1.8rem;
            margin-bottom: 15px;
            border-left: 6px solid #faa837;
            padding-left: 18px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 22px;
            padding: 16px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            border-bottom: 1px solid #4b78a5;
            padding: 8px 5px;
        }
        .summary-item.total {
            grid-column: span 2;
            background: #05203b;
            border-radius: 20px;
            padding: 12px;
            font-weight: 800;
            margin-top: 8px;
            border-bottom: none;
        }

        /* spycode ওয়াটারমার্ক */
        .watermark {
            text-align: center;
            margin-top: 25px;
            padding-top: 18px;
            border-top: 3px dashed #5577a5;
        }
        .watermark span {
            background: #0f3153;
            color: #dde9ff;
            padding: 10px 55px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            display: inline-block;
        }

        /* অ্যাডমিন প্যানেল (এডিট/রিমুভ) */
        .admin-panel {
            background: #eaf2fd;
            border-radius: 28px;
            padding: 22px 18px;
            margin-top: 25px;
        }
        .admin-panel h3 {
            font-size: 1.8rem;
            color: #10375e;
            margin-bottom: 18px;
        }
        .admin-table {
            overflow-x: auto;
            background: white;
            border-radius: 24px;
            padding: 6px;
        }
        .admin-table table {
            min-width: 500px;
        }
        .edit-btn, .rm-btn {
            border: none;
            border-radius: 30px;
            padding: 6px 18px;
            font-weight: bold;
            color: white;
            margin: 2px;
            cursor: pointer;
        }
        .edit-btn { background: #1790a5; }
        .rm-btn { background: #c43e4f; }

        #statusMsg {
            background: #d3f0da;
            color: #15532d;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
        }

        /* মোবাইল অ্যাডজাস্টমেন্ট */
        @media (max-width: 700px) {
            .desktop-mode {
                margin: 15px 10px;
                padding: 20px 15px;
            }
            .member-form {
                flex-direction: column;
                align-items: stretch;
            }
            .add-button {
                width: 100%;
                justify-content: center;
            }
            .control-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            .download-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- কন্টেইনার ডায়নামিকভাবে JS দিয়ে পূরণ হবে -->
    <div id="appContainer"></div>

    <script>
        (function() {
            // ========== ডিভাইস ডিটেকশন ==========
            function isAndroid() {
                return /Android/i.test(navigator.userAgent);
            }

            // ========== ডেটা ম্যানেজমেন্ট ==========
            let members = [
                { name: 'রাজু', mil: 50, extra: 100, joma: 2800 },
                { name: 'সুমি', mil: 42, extra: 0, joma: 2100 },
                { name: 'হাসান', mil: 38, extra: 250, joma: 2200 }
            ];

            // ========== রেন্ডার ফাংশন ==========
            function renderApp() {
                const container = document.getElementById('appContainer');
                const mode = isAndroid() ? 'android' : 'desktop';
                
                let html = '';

                if (mode === 'desktop') {
                    html = ` <div class="desktop-mode">
                        <div class="desktop-header">
                            <h1>🍚 মিল ক্যালকুলেটর</h1>
                            <a href="SAHED.html" class="about-link">📌 About Me (SAHED)</a>
                        </div>

                        <!-- মাস্টার ইনপুট -->
                        <div class="input-card">
                            <div class="desktop-grid">
                                <div class="input-field"><label>💰 মোট টাকা</label><input type="number" id="mottaka" value="25000"></div>
                                <div class="input-field"><label>🧾 মোট খরচ</label><input type="number" id="motkhoroch" value="18000"></div>
                                <div class="input-field"><label>🍲 মোট মিল</label><input type="number" id="motmil" value="360"></div>
                            </div>
                        </div>

                        <!-- অ্যাড মেম্বার -->
                        <div class="add-card">
                            <div class="add-title">➕ নতুন সদস্য যোগ করুন</div>
                            <div class="member-form">
                                <div class="member-input"><label>নাম</label><input type="text" id="memName" placeholder="রাজু"></div>
                                <div class="member-input"><label>মিল</label><input type="number" id="memMil" placeholder="45"></div>
                                <div class="member-input"><label>অতিরিক্ত</label><input type="number" id="memExtra" placeholder="200"></div>
                                <div class="member-input"><label>জমা</label><input type="number" id="memJoma" placeholder="3500"></div>
                                <button class="add-button" onclick="addMember()">✅ যোগ করুন</button>
                            </div>
                        </div>

                        <!-- কন্ট্রোল বার -->
                        <div class="control-bar">
                            <div class="title-group">
                                <h2>📋 সদস্য তালিকা</h2>
                                <button class="clear-btn" onclick="clearAllMembers()">🗑️ সব মুছুন</button>
                            </div>
                            <button class="download-btn" onclick="downloadPNG()">📥 PNG ডাউনলোড</button>
                        </div>

                        <!-- আউটপুট এরিয়া -->
                        <div id="outputArea"></div>

                        <div id="statusMsg"></div>

                        <!-- অ্যাডমিন প্যানেল -->
                        <div class="admin-panel">
                            <h3>⚙️ এডিট / রিমুভ সদস্য</h3>
                            <div class="admin-table">
                                <table>
                                    <thead><tr><th>নাম</th><th>মিল</th><th>অতিরিক্ত</th><th>জমা</th><th>অ্যাকশন</th></tr></thead>
                                    <tbody id="adminBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                } else {
                    html = ` <div class="android-mode">
                        <div class="android-header">
                            <h1>🍚 মিল ক্যালক</h1>
                            <a href="SAHED.html" class="android-chip">📌 SAHED</a>
                        </div>

                        <!-- মাস্টার ইনপুট -->
                        <div class="input-card">
                            <div class="android-flex">
                                <div class="input-field"><label>💰 মোট টাকা</label><input type="number" id="mottaka" value="25000"></div>
                                <div class="input-field"><label>🧾 মোট খরচ</label><input type="number" id="motkhoroch" value="18000"></div>
                                <div class="input-field"><label>🍲 মোট মিল</label><input type="number" id="motmil" value="360"></div>
                            </div>
                        </div>

                        <!-- অ্যাড মেম্বার -->
                        <div class="add-card">
                            <div class="add-title">➕ নতুন সদস্য</div>
                            <div class="member-form" style="flex-direction: column;">
                                <div class="member-input"><label>নাম</label><input type="text" id="memName" placeholder="রাজু"></div>
                                <div class="member-input"><label>মিল</label><input type="number" id="memMil" placeholder="45"></div>
                                <div class="member-input"><label>অতিরিক্ত</label><input type="number" id="memExtra" placeholder="200"></div>
                                <div class="member-input"><label>জমা</label><input type="number" id="memJoma" placeholder="3500"></div>
                                <button class="add-button" onclick="addMember()">✅ যোগ করুন</button>
                            </div>
                        </div>

                        <!-- কন্ট্রোল বার -->
                        <div class="control-bar" style="flex-direction: column;">
                            <div style="display: flex; justify-content: space-between; width: 100%;">
                                <h2 style="font-size:1.6rem;">📋 তালিকা</h2>
                                <button class="clear-btn" onclick="clearAllMembers()">🗑️ মুছুন</button>
                            </div>
                            <button class="download-btn" style="width:100%;" onclick="downloadPNG()">📥 PNG ডাউনলোড</button>
                        </div>

                        <!-- আউটপুট এরিয়া -->
                        <div id="outputArea"></div>

                        <div id="statusMsg"></div>

                        <!-- অ্যাডমিন প্যানেল -->
                        <div class="admin-panel">
                            <h3 style="font-size:1.5rem;">⚙️ এডিট/রিমুভ</h3>
                            <div class="admin-table">
                                <table>
                                    <thead><tr><th>নাম</th><th>মিল</th><th>অতি</th><th>জমা</th><th>অ্যাকশন</th></tr></thead>
                                    <tbody id="adminBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                }

                container.innerHTML = html;

                // আউটপুট এরিয়া আপডেট
                updateOutputArea();

                // ইনপুট ইভেন্ট লিসেনার
                document.getElementById('mottaka')?.addEventListener('input', updateOutputArea);
                document.getElementById('motkhoroch')?.addEventListener('input', updateOutputArea);
                document.getElementById('motmil')?.addEventListener('input', updateOutputArea);
            }

            // ========== আউটপুট এরিয়া আপডেট ==========
            function updateOutputArea() {
                const outputDiv = document.getElementById('outputArea');
                if (!outputDiv) return;

                const mottaka = parseFloat(document.getElementById('mottaka')?.value) || 0;
                const motkhoroch = parseFloat(document.getElementById('motkhoroch')?.value) || 0;
                const motmil = parseFloat(document.getElementById('motmil')?.value) || 1;
                
                const milret = motmil ? motkhoroch / motmil : 0;
                const oboshisto = mottaka - motkhoroch;

                let totalJoma = 0, totalEx = 0;
                let memberRows = '';

                members.forEach(mem => {
                    const mil = parseFloat(mem.mil) || 0;
                    const extra = parseFloat(mem.extra) || 0;
                    const joma = parseFloat(mem.joma) || 0;
                    
                    const milKhoroch = milret * mil;
                    const totalCost = milKhoroch + extra;
                    const diff = joma - totalCost;

                    totalJoma += joma;
                    totalEx += totalCost;

                    let signText = diff > 0 ? `${mem.name} পাবে ${diff.toFixed(2)}` : 
                                  (diff < 0 ? `ম্যানেজার পাবে ${Math.abs(diff).toFixed(2)}` : 'সমান');

                    memberRows += `<tr>
                        <td>${mem.name}</td>
                        <td>${mil.toFixed(1)}</td>
                        <td>${extra.toFixed(1)}</td>
                        <td>${joma.toFixed(1)}</td>
                        <td>${milKhoroch.toFixed(1)}</td>
                        <td>${totalCost.toFixed(1)}</td>
                        <td>${signText}</td>
                    </tr>`;
                });

                const summaryHTML = `
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>নাম</th><th>মিল</th><th>অতিরিক্ত</th><th>জমা</th><th>মিল খরচ</th><th>মোট খরচ</th><th>পাবে/দেবে</th></tr></thead>
                            <tbody>${memberRows || '<tr><td colspan="7" style="text-align:center; padding:40px;">👥 কোনো সদস্য নেই</td></tr>'}</tbody>
                        </table>
                    </div>
                    <div class="summary-card">
                        <h3>📊 সমষ্টিগত হিসাব</h3>
                        <div class="summary-grid">
                            <div class="summary-item"><span>মিল রেট</span><span>${milret.toFixed(2)}</span></div>
                            <div class="summary-item"><span>অবশিষ্ট</span><span>${oboshisto.toFixed(2)}</span></div>
                            <div class="summary-item"><span>মোট সদস্য</span><span>${members.length}</span></div>
                            <div class="summary-item"><span>মোট জমা</span><span>${totalJoma.toFixed(2)}</span></div>
                            <div class="summary-item"><span>মোট খরচ</span><span>${totalEx.toFixed(2)}</span></div>
                            <div class="summary-item total"><span>ম্যানেজার পাবে/দেবে</span><span>${(totalJoma - totalEx).toFixed(2)} টাকা</span></div>
                        </div>
                    </div>
                    <div class="watermark">
                        <span>🔍 spycode</span>
                    </div>
                `;

                outputDiv.innerHTML = summaryHTML;

                // অ্যাডমিন টেবিল আপডেট
                updateAdminTable();
            }

            // ========== অ্যাডমিন টেবিল আপডেট ==========
            function updateAdminTable() {
                const adminBody = document.getElementById('adminBody');
                if (!adminBody) return;

                let rows = '';
                members.forEach((mem, idx) => {
                    rows += `<tr>
                        <td>${mem.name}</td>
                        <td>${mem.mil}</td>
                        <td>${mem.extra}</td>
                        <td>${mem.joma}</td>
                        <td>
                            <button class="edit-btn" onclick="editMember(${idx})">সম্পাদনা</button>
                            <button class="rm-btn" onclick="removeMember(${idx})">মুছুন</button>
                        </td>
                    </tr>`;
                });
                adminBody.innerHTML = rows || '<tr><td colspan="5" style="text-align:center; padding:20px;">কোনো সদস্য নেই</td></tr>';
            }

            // ========== গ্লোবাল ফাংশন ==========
            window.addMember = function() {
                const name = document.getElementById('memName')?.value.trim() || 'অতিথি';
                const mil = parseFloat(document.getElementById('memMil')?.value);
                const extra = parseFloat(document.getElementById('memExtra')?.value);
                const joma = parseFloat(document.getElementById('memJoma')?.value);

                if (isNaN(mil) || mil < 0 || isNaN(extra) || extra < 0 || isNaN(joma) || joma < 0) {
                    alert('সঠিক সংখ্যা দিন');
                    return;
                }

                members.push({ name, mil, extra, joma });
                
                // ইনপুট ফিল্ড খালি
                document.getElementById('memName').value = '';
                document.getElementById('memMil').value = '';
                document.getElementById('memExtra').value = '';
                document.getElementById('memJoma').value = '';
                
                updateOutputArea();
            };

            window.removeMember = function(index) {
                if (index >= 0 && index < members.length) {
                    members.splice(index, 1);
                    updateOutputArea();
                }
            };

            window.clearAllMembers = function() {
                if (members.length > 0 && confirm('সমস্ত সদস্য মুছে ফেলবেন?')) {
                    members = [];
                    updateOutputArea();
                }
            };

            window.editMember = function(index) {
                const mem = members[index];
                if (!mem) return;
                
                document.getElementById('memName').value = mem.name;
                document.getElementById('memMil').value = mem.mil;
                document.getElementById('memExtra').value = mem.extra;
                document.getElementById('memJoma').value = mem.joma;
                
                if (confirm('এই সদস্য সম্পাদনা করতে সরিয়ে দিন')) {
                    members.splice(index, 1);
                    updateOutputArea();
                }
            };

            // ========== PNG ডাউনলোড (সম্পূর্ণ আউটপুট) ==========
            window.downloadPNG = function() {
                const outputArea = document.getElementById('outputArea');
                const status = document.getElementById('statusMsg');
                if (!outputArea) return;

                status.innerText = '⏳ PNG তৈরি হচ্ছে (spycode ওয়াটারমার্ক সহ)...';

                html2canvas(outputArea, {
                    scale: 2.5,
                    backgroundColor: '#ffffff',
                    windowWidth: isAndroid() ? 480 : 1300, // ডিভাইস অনুযায়ী
                    windowHeight: 1600,
                    logging: false,
                    allowTaint: true,
                    useCORS: true
                }).then(canvas => {
                    // অতিরিক্ত spycode ওয়াটারমার্ক
                    const ctx = canvas.getContext('2d');
                    ctx.font = 'bold 32px Arial, sans-serif';
                    ctx.fillStyle = 'rgba(140, 170, 210, 0.23)';
                    ctx.rotate(-0.15);
                    ctx.fillText('spycode', 200, canvas.height - 80);
                    ctx.rotate(0.15);

                    const link = document.createElement('a');
                    link.download = 'meal_spycode.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    status.innerText = '✅ ডাউনলোড সম্পন্ন! (সম্পূর্ণ আউটপুট)';
                    setTimeout(() => status.innerText = '', 3500);
                }).catch(err => {
                    status.innerText = '❌ ডাউনলোড ব্যর্থ';
                    console.error(err);
                });
            };

            // ========== হেল্পার ==========
            window.isAndroid = isAndroid;

            // ========== ইনিশিয়াল রেন্ডার ==========
            renderApp();

            // ডিভাইস পরিবর্তন মনিটর (রেসপনসিভ)
            window.addEventListener('resize', function() {
                // শুধু ওরিয়েন্টেশন পরিবর্তনে রি-রেন্ডার না করাই ভালো, তবে ইউজার এজেন্ট চেক করে করতে পারি
                // কিন্তু ইউজার এজেন্ট স্থির, তাই রি-রেন্ডার দরকার নেই
            });
        })();
    </script>
</body>
</html>
