<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>মিল ক্যালকুলেটর 💠 ডেস্কটপ মোড (সব ডিভাইস)</title>
    <!-- html2canvas (stable) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b2c48 0%, #1c4e78 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 16px;
        }

        /* মূল কন্টেইনার - সম্পূর্ণ ডেস্কটপ অনুপাতে, কিন্তু fluid */
        .calculator {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            box-shadow: 0 35px 65px rgba(0, 0, 0, 0.4);
            padding: clamp(20px, 4vw, 40px);
            border: 2px solid rgba(255,255,240,0.5);
        }

        /* হেডার - ডেস্কটপ স্টাইল, কিন্তু responsive */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 3px dashed #31699e;
            padding-bottom: 20px;
        }
        h1 {
            color: #0c3253;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .about-link {
            background: #ffb347;
            color: #0e263b;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            border: 2px solid #ffe29c;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            transition: 0.2s;
        }
        .about-link:hover {
            background: #ffa01e;
            transform: translateY(-2px);
        }

        /* ইনপুট গ্রিড - ডেস্কটপ স্টাইলিং */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
            background: #e4f0ff;
            border-radius: 32px;
            padding: 28px 24px;
            margin: 25px 0;
            border: 2px solid #b3cefd;
        }
        .input-field label {
            display: block;
            font-weight: 700;
            color: #103f6b;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .input-field input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #b0caf5;
            border-radius: 40px;
            font-size: 1.1rem;
            background: white;
            transition: 0.2s;
        }
        .input-field input:focus {
            border-color: #1a5cb0;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26,92,176,0.2);
        }

        /* অ্যাড সেকশন */
        .add-section {
            background: #d3e7ff;
            border-radius: 36px;
            padding: 28px 24px;
            margin: 25px 0;
            border: 3px solid white;
        }
        .add-title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: #0f3557;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .add-title span {
            background: #133e6b;
            color: white;
            padding: 6px 24px;
            border-radius: 50px;
        }
        .member-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 18px;
            align-items: end;
        }
        .form-field label {
            font-weight: 600;
            color: #0a2e51;
            margin-bottom: 6px;
            display: block;
            font-size: 1rem;
        }
        .form-field input {
            width: 100%;
            padding: 16px 16px;
            border-radius: 40px;
            border: 2px solid #aec6f0;
            background: white;
            font-size: 1rem;
        }
        .add-btn {
            background: #133e6b;
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            border: 2px solid #9cb9ff;
            box-shadow: 0 10px 18px #0a2a4a60;
            transition: 0.2s;
            height: fit-content;
            white-space: nowrap;
        }

        /* কন্ট্রোল প্যানেল (ডেস্কটপ লেআউট) */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin: 30px 0 25px;
        }
        .title-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 18px;
        }
        .title-group h2 {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: #102f50;
        }
        .clear-btn {
            background: #c93e4e;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ffb3b3;
        }
        .download-btn {
            background: #1d6e41;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 3px solid #b0e6b0;
            box-shadow: 0 8px 18px #0b4623;
        }

        /* ===== PNG আউটপুট এরিয়া (শুধু আউটপুট) ===== */
        #outputArea {
            background: white;
            border-radius: 36px;
            padding: 28px 24px;
            border: 3px solid #bdd6ff;
            margin: 25px 0 20px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }

        /* টেবিল ধারক - পূর্ণপ্রস্থ, কোনো ওভারফ্লো ছাড়া */
        .table-container {
            width: 100%;
            border-radius: 28px;
            background: #e9f2ff;
            padding: 8px;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            table-layout: fixed;
        }
        th {
            background: #0e3b70;
            color: white;
            padding: 18px 8px;
            font-weight: 600;
        }
        td {
            padding: 16px 8px;
            border-bottom: 2px solid #dae6ff;
            color: #11212e;
            text-align: center;
            word-break: break-word;
        }

        /* সমষ্টি বক্স - ডেস্কটপ স্টাইল */
        .summary-block {
            background: linear-gradient(115deg, #082b4a, #1b4e7a);
            border-radius: 32px;
            padding: 26px 22px;
            color: white;
            margin-top: 15px;
        }
        .summary-block h3 {
            color: #ffda99;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            margin-bottom: 18px;
            border-left: 7px solid #faa837;
            padding-left: 22px;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            border-radius: 28px;
            overflow: hidden;
            font-size: clamp(1rem, 2vw, 1.2rem);
            table-layout: fixed;
        }
        .summary-table th {
            background: #f0a634;
            color: #162b40;
            padding: 16px 8px;
        }
        .summary-table td {
            color: #fff2d4;
            border-bottom: 2px solid #4b7aa8;
            padding: 16px;
        }
        .grand-total-row {
            background: #05203b;
            font-weight: 800;
        }

        /* spycode ওয়াটারমার্ক - দৃশ্যমান */
        .watermark {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 4px dashed #5577a5;
        }
        .watermark span {
            background: #0f3153;
            color: #dde9ff;
            padding: 10px 55px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            display: inline-block;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        /* অ্যাডমিন প্যানেল (এডিট/রিমুভ) - শুধু ওয়েব ইন্টারফেস */
        .admin-panel {
            background: #eaf2fd;
            border-radius: 36px;
            padding: 28px 24px;
            margin-top: 30px;
        }
        .admin-panel h3 {
            font-size: 2rem;
            color: #10375e;
            margin-bottom: 20px;
        }
        .admin-table {
            background: white;
            border-radius: 28px;
            padding: 8px;
            overflow-x: auto;
        }
        .admin-table table {
            min-width: 650px;
            table-layout: fixed;
        }
        .edit-btn, .rm-btn {
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 2px;
        }
        .edit-btn { background: #1790a5; }
        .rm-btn { background: #c43e4f; }

        #statusMsg {
            background: #d3f0da;
            color: #15532d;
            padding: 14px 25px;
            border-radius: 60px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            font-size: 1.1rem;
        }

        /* সম্পূর্ণ ডেস্কটপ মোড নিশ্চিত করতে মোবাইল ব্রেকপয়েন্ট */
        @media (max-width: 700px) {
            .calculator { padding: 16px; }
            .member-form { grid-template-columns: 1fr; }
            .add-btn { width: 100%; }
            .control-bar { flex-direction: column; align-items: stretch; }
            .download-btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- হেডার (শুধু About Me) -->
        <div class="header">
            <h1>🍚 মিল ক্যালকুলেটর</h1>
            <a href="SAHED.html" class="about-link">📌 About Me (SAHED)</a>
        </div>

        <!-- মাস্টার ইনপুট -->
        <div class="input-grid">
            <div class="input-field"><label>💰 মোট টাকা</label><input type="number" id="mottaka" value="25000"></div>
            <div class="input-field"><label>🧾 মোট খরচ</label><input type="number" id="motkhoroch" value="18000"></div>
            <div class="input-field"><label>🍲 মোট মিল</label><input type="number" id="motmil" value="360"></div>
        </div>

        <!-- অ্যাড মেম্বার (অপ্রয়োজনীয় কিছু নেই) -->
        <div class="add-section">
            <div class="add-title"><span>➕</span> নতুন সদস্য যোগ করুন</div>
            <div class="member-form">
                <div class="form-field"><label>নাম</label><input type="text" id="memName" placeholder="রাজু"></div>
                <div class="form-field"><label>মিল</label><input type="number" id="memMil" placeholder="45"></div>
                <div class="form-field"><label>অতিরিক্ত</label><input type="number" id="memExtra" placeholder="200"></div>
                <div class="form-field"><label>জমা</label><input type="number" id="memJoma" placeholder="3500"></div>
                <button class="add-btn" onclick="addMember()">✅ যোগ কর</button>
            </div>
        </div>

        <!-- কন্ট্রোল বার (শুধু প্রয়োজনীয়) -->
        <div class="control-bar">
            <div class="title-group">
                <h2>📋 সদস্য তালিকা</h2>
                <button class="clear-btn" onclick="clearAllMembers()">🗑️ সব মুছুন</button>
            </div>
            <button class="download-btn" onclick="downloadPNG()">📥 PNG ডাউনলোড</button>
        </div>

        <!-- ========== PNG আউটপুট এরিয়া (শুধু আউটপুট) ========= -->
        <div id="outputArea">
            <div class="table-container">
                <table id="memberTbl">
                    <thead><tr><th>নাম</th><th>মিল</th><th>অতিরিক্ত</th><th>জমা</th><th>মিল খরচ</th><th>মোট খরচ</th><th>পাবে/দেবে</th></tr></thead>
                    <tbody id="memberBody"></tbody>
                </table>
            </div>

            <div class="summary-block">
                <h3>📊 সমষ্টিগত হিসাব</h3>
                <table class="summary-table">
                    <thead><tr><th>বিবরণ</th><th>মান</th></tr></thead>
                    <tbody id="summaryBody">
                        <tr><td>মিল রেট</td><td id="rateShow">-</td></tr>
                        <tr><td>অবশিষ্ট টাকা</td><td id="oboshistoShow">-</td></tr>
                        <tr><td>মোট সদস্য</td><td id="totalMembersShow">0</td></tr>
                        <tr><td>মোট জমা</td><td id="totalJomaShow">0</td></tr>
                        <tr><td>মোট খরচ</td><td id="totalExShow">0</td></tr>
                        <tr class="grand-total-row"><td>ম্যানেজার পাবে/দেবে</td><td id="managerBalanceShow">0</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- spycode ওয়াটারমার্ক (সরাসরি) -->
            <div class="watermark">
                <span>🔍 spycode</span>
            </div>
        </div>
        <!-- ========== PNG আউটপুট শেষ ========= -->

        <div id="statusMsg"></div>

        <!-- অ্যাডমিন প্যানেল (এডিট/রিমুভ) - শুধু ইন্টারফেস -->
        <div class="admin-panel">
            <h3>⚙️ এডিট / রিমুভ সদস্য</h3>
            <div class="admin-table">
                <table>
                    <thead><tr><th>নাম</th><th>মিল</th><th>অতিরিক্ত</th><th>জমা</th><th>অ্যাকশন</th></tr></thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let members = [];

            const mottakaInp = document.getElementById('mottaka');
            const motkhorochInp = document.getElementById('motkhoroch');
            const motmilInp = document.getElementById('motmil');
            const nameInp = document.getElementById('memName');
            const milInp = document.getElementById('memMil');
            const extraInp = document.getElementById('memExtra');
            const jomaInp = document.getElementById('memJoma');

            const memberBody = document.getElementById('memberBody');
            const adminBody = document.getElementById('adminBody');

            function getBase() {
                const mottaka = parseFloat(mottakaInp.value) || 0;
                const motkhoroch = parseFloat(motkhorochInp.value) || 0;
                const motmil = parseFloat(motmilInp.value) || 1;
                return {
                    mottaka, motkhoroch, motmil,
                    oboshisto: mottaka - motkhoroch,
                    milret: motmil ? motkhoroch / motmil : 0
                };
            }

            function refreshUI() {
                const base = getBase();
                const milret = base.milret;
                let totalJoma = 0, totalEx = 0;
                let memberRows = '', adminRows = '';

                members.forEach((mem, idx) => {
                    const mil = parseFloat(mem.mil) || 0;
                    const extra = parseFloat(mem.extra) || 0;
                    const joma = parseFloat(mem.joma) || 0;
                    const milKhoroch = milret * mil;
                    const totalCost = milKhoroch + extra;
                    const diff = joma - totalCost;

                    totalJoma += joma;
                    totalEx += totalCost;

                    let sign = diff > 0 ? `${mem.name} পাবে ${diff.toFixed(2)} টাকা` : (diff < 0 ? `ম্যানেজার পাবে ${Math.abs(diff).toFixed(2)} টাকা` : 'সমান ০');

                    memberRows += `<tr><td>${mem.name}</td><td>${mil.toFixed(2)}</td><td>${extra.toFixed(2)}</td><td>${joma.toFixed(2)}</td><td>${milKhoroch.toFixed(2)}</td><td>${totalCost.toFixed(2)}</td><td>${sign}</td></tr>`;

                    adminRows += `<tr><td>${mem.name}</td><td>${mil}</td><td>${extra}</td><td>${joma}</td><td><button class="edit-btn" onclick="editMember(${idx})">সম্পাদনা</button><button class="rm-btn" onclick="removeMember(${idx})">মুছুন</button></td></tr>`;
                });

                memberBody.innerHTML = memberRows || '<tr><td colspan="7" style="padding:40px; text-align:center;">👥 কোনো সদস্য নেই। নতুন যোগ করুন</td></tr>';
                adminBody.innerHTML = adminRows || '<tr><td colspan="5" style="padding:30px; text-align:center;">কোনো সদস্য নেই</td></tr>';

                document.getElementById('rateShow').innerText = milret.toFixed(2);
                document.getElementById('oboshistoShow').innerText = base.oboshisto.toFixed(2);
                document.getElementById('totalMembersShow').innerText = members.length;
                document.getElementById('totalJomaShow').innerText = totalJoma.toFixed(2);
                document.getElementById('totalExShow').innerText = totalEx.toFixed(2);
                document.getElementById('managerBalanceShow').innerText = (totalJoma - totalEx).toFixed(2) + ' টাকা';
            }

            window.addMember = function() {
                const name = nameInp.value.trim() || 'অতিথি';
                const mil = parseFloat(milInp.value);
                const extra = parseFloat(extraInp.value);
                const joma = parseFloat(jomaInp.value);
                if (isNaN(mil) || mil<0 || isNaN(extra) || extra<0 || isNaN(joma) || joma<0) {
                    alert('মিল, অতিরিক্ত, জমা সঠিক সংখ্যা দিন'); return;
                }
                members.push({ name, mil, extra, joma });
                nameInp.value = ''; milInp.value = ''; extraInp.value = ''; jomaInp.value = '';
                refreshUI();
            };

            window.removeMember = function(i) { if(i>=0 && i<members.length) { members.splice(i,1); refreshUI(); } };
            window.clearAllMembers = function() { if(members.length && confirm('সব সদস্য মুছবেন?')) { members = []; refreshUI(); } };
            window.editMember = function(i) {
                const m = members[i];
                if(!m) return;
                nameInp.value = m.name; milInp.value = m.mil; extraInp.value = m.extra; jomaInp.value = m.joma;
                if(confirm('এডিট করতে সরান')) { members.splice(i,1); refreshUI(); }
            };

            [mottakaInp, motkhorochInp, motmilInp].forEach(el => el.addEventListener('input', refreshUI));

            // ডেমো ডাটা (প্রয়োজনীয়)
            if (!members.length) {
                members.push({ name:'রাজু', mil:50, extra:100, joma:2800 });
                members.push({ name:'সুমি', mil:42, extra:0, joma:2100 });
                members.push({ name:'হাসান', mil:38, extra:250, joma:2200 });
                refreshUI();
            }

            // PNG ডাউনলোড - সম্পূর্ণ টেবিল, ডেস্কটপ ভিউ
            window.downloadPNG = function() {
                const area = document.getElementById('outputArea');
                const status = document.getElementById('statusMsg');
                status.innerText = '⏳ PNG তৈরি হচ্ছে (spycode ওয়াটারমার্ক)...';

                html2canvas(area, {
                    scale: 2.2,
                    backgroundColor: '#ffffff',
                    windowWidth: 1300,   // ডেস্কটপ মোড সিমুলেট
                    windowHeight: 1800,
                    logging: false,
                    allowTaint: true
                }).then(canvas => {
                    const ctx = canvas.getContext('2d');
                    ctx.font = 'bold 34px "Segoe UI", Arial, sans-serif';
                    ctx.fillStyle = 'rgba(140, 170, 210, 0.25)';
                    ctx.rotate(-0.15);
                    ctx.fillText('spycode', 250, canvas.height - 70);
                    ctx.rotate(0.15);

                    const link = document.createElement('a');
                    link.download = 'meal_spycode_desktop.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    status.innerText = '✅ সম্পন্ন! (পুরো টেবিল + spycode)';
                    setTimeout(()=> status.innerText = '', 4000);
                }).catch(e => { status.innerText = '❌ ব্যর্থ'; console.error(e); });
            };

            refreshUI();
        })();
    </script>
</body>
</html>
