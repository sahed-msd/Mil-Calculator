<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🍚 মিল ক্যালকুলেটর | spycode</title>
    
    <!-- Bootstrap 5 Framework Integration -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2canvas for PNG download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Hind Siliguri', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b263b 0%, #1a4a7a 100%);
            padding: 10px;
        }

        /* Main Container - Fully Responsive */
        .app-container {
            max-width: 1400px;
            margin: 15px auto;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        /* Mobile Specific Adjustments */
        @media (max-width: 576px) {
            .app-container {
                padding: 15px;
                border-radius: 25px;
                margin: 8px;
            }
            
            h1 {
                font-size: 1.8rem !important;
            }
            
            .display-6 {
                font-size: 1.3rem !important;
            }
            
            .btn {
                padding: 12px 16px !important;
                font-size: 1rem !important;
            }
            
            .table th, .table td {
                font-size: 0.85rem;
                padding: 10px 5px;
                white-space: nowrap;
            }
            
            .summary-card {
                padding: 15px !important;
            }
        }

        /* Tablet Adjustments */
        @media (min-width: 577px) and (max-width: 768px) {
            .app-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2.2rem !important;
            }
        }

        /* Custom Card Styles */
        .custom-card {
            background: linear-gradient(145deg, #ffffff, #f0f8ff);
            border-radius: 25px;
            padding: 20px;
            border: 2px solid #d7e5ff;
            box-shadow: 0 8px 20px rgba(0, 20, 40, 0.1);
            height: 100%;
        }

        .input-field label {
            font-weight: 700;
            color: #103f6b;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .input-field input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #b0caf5;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .input-field input:focus {
            border-color: #1a5cb0;
            box-shadow: 0 0 0 4px rgba(26,92,176,0.2);
            outline: none;
        }

        .member-form {
            background: linear-gradient(145deg, #dcebff, #c3dfff);
            border-radius: 25px;
            padding: 20px;
            margin: 20px 0;
        }

        .summary-card {
            background: linear-gradient(115deg, #082b4a, #1b4e7a, #2a69a0);
            border-radius: 25px;
            padding: 25px;
            color: white;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-weight: 600;
        }

        .summary-item.total {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 800;
            margin-top: 10px;
            border: none;
        }

        .watermark {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 3px dashed #5577a5;
        }

        .watermark span {
            background: linear-gradient(45deg, #0f3153, #1a4a7a);
            color: #dde9ff;
            padding: 10px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 800;
            display: inline-block;
        }

        /* Table Responsive */
        .table-responsive {
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #c7dfff;
            background: white;
        }

        .table {
            margin-bottom: 0;
        }

        .table th {
            background: linear-gradient(45deg, #0e3b70, #1a5cb0);
            color: white;
            font-weight: 700;
            white-space: nowrap;
        }

        .btn-action {
            border-radius: 50px;
            padding: 8px 16px;
            font-weight: 600;
            margin: 2px;
        }

        /* Android WebView Optimization */
        @supports (-webkit-overflow-scrolling: touch) {
            .app-container {
                -webkit-overflow-scrolling: touch;
            }
            
            input, button {
                -webkit-appearance: none;
                border-radius: 50px;
            }
        }

        /* Loading Animation */
        .loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Custom Button Styles */
        .btn-gradient {
            background: linear-gradient(45deg, #134579, #1a5cb0);
            color: white;
            border: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(19,69,121,0.4);
            color: white;
        }

        .btn-success-gradient {
            background: linear-gradient(45deg, #1d6e41, #28a745);
            color: white;
            font-weight: 700;
        }

        .btn-danger-gradient {
            background: linear-gradient(45deg, #c93e4e, #d9546a);
            color: white;
            font-weight: 700;
        }

        /* Grid System Override for Better Responsiveness */
        .row {
            margin: -10px;
        }
        
        .col-12, .col-md-6, .col-lg-4 {
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- Header Section - Fully Responsive with Bootstrap Grid -->
        <div class="row align-items-center mb-4">
            <div class="col-8 col-md-6">
                <h1 class="display-4 fw-bold" style="background: linear-gradient(45deg, #0c3253, #1a5cb0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    <i class="fas fa-utensils me-2"></i>মিল ক্যালক
                </h1>
            </div>
            <div class="col-4 col-md-6 text-end">
                <a href="SAHED.html" class="btn btn-warning btn-lg rounded-pill px-4 py-3 fw-bold shadow" target="_blank">
                    <i class="fas fa-user me-2"></i><span class="d-none d-sm-inline">SAHED</span><span class="d-sm-none">📌</span>
                </a>
            </div>
        </div>

        <!-- Input Cards - Responsive Grid -->
        <div class="row">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="custom-card">
                    <div class="input-field">
                        <label><i class="fas fa-coins me-2 text-warning"></i>মোট টাকা</label>
                        <input type="number" id="mottaka" class="form-control form-control-lg rounded-pill" value="25000" min="0">
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <div class="custom-card">
                    <div class="input-field">
                        <label><i class="fas fa-receipt me-2 text-danger"></i>মোট খরচ</label>
                        <input type="number" id="motkhoroch" class="form-control form-control-lg rounded-pill" value="18000" min="0">
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <div class="custom-card">
                    <div class="input-field">
                        <label><i class="fas fa-bowl-food me-2 text-success"></i>মোট মিল</label>
                        <input type="number" id="motmil" class="form-control form-control-lg rounded-pill" value="360" min="1">
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Member Section -->
        <div class="member-form mt-4">
            <h3 class="fw-bold mb-3" style="color: #103b66;">
                <i class="fas fa-user-plus me-2"></i>নতুন সদস্য যোগ করুন
            </h3>
            <div class="row g-3">
                <div class="col-12 col-sm-6 col-md-3">
                    <label class="fw-bold mb-1">👤 নাম</label>
                    <input type="text" id="memName" class="form-control rounded-pill" placeholder="রাজু">
                </div>
                <div class="col-12 col-sm-6 col-md-2">
                    <label class="fw-bold mb-1">🍚 মিল</label>
                    <input type="number" id="memMil" class="form-control rounded-pill" placeholder="45" min="0">
                </div>
                <div class="col-12 col-sm-6 col-md-2">
                    <label class="fw-bold mb-1">💸 অতিরিক্ত</label>
                    <input type="number" id="memExtra" class="form-control rounded-pill" placeholder="200" min="0">
                </div>
                <div class="col-12 col-sm-6 col-md-2">
                    <label class="fw-bold mb-1">💰 জমা</label>
                    <input type="number" id="memJoma" class="form-control rounded-pill" placeholder="3500" min="0">
                </div>
                <div class="col-12 col-md-3 d-flex align-items-end">
                    <button class="btn btn-gradient w-100 py-3 rounded-pill fw-bold" onclick="addMember()">
                        <i class="fas fa-check-circle me-2"></i>যোগ করুন
                    </button>
                </div>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="row align-items-center my-4">
            <div class="col-12 col-md-6 mb-3 mb-md-0">
                <div class="d-flex align-items-center gap-3">
                    <h2 class="fw-bold m-0" style="color: #102f50;">
                        <i class="fas fa-list me-2"></i>সদস্য তালিকা
                    </h2>
                    <button class="btn btn-danger-gradient rounded-pill px-4 py-2" onclick="clearAllMembers()">
                        <i class="fas fa-trash-alt me-2"></i>সব মুছুন
                    </button>
                </div>
            </div>
            <div class="col-12 col-md-6 text-md-end">
                <button class="btn btn-success-gradient rounded-pill px-5 py-3 w-100 w-md-auto" onclick="downloadPNG()">
                    <i class="fas fa-download me-2"></i>PNG ডাউনলোড
                </button>
            </div>
        </div>

        <!-- Output Area -->
        <div id="outputArea" class="mb-4"></div>
        
        <!-- Status Message -->
        <div id="statusMsg" class="alert d-none"></div>

        <!-- Admin Panel -->
        <div class="custom-card mt-4">
            <h3 class="fw-bold mb-3" style="color: #10375e;">
                <i class="fas fa-cog me-2"></i>এডিট / রিমুভ সদস্য
            </h3>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>নাম</th>
                            <th>মিল</th>
                            <th>অতিরিক্ত</th>
                            <th>জমা</th>
                            <th>অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Watermark -->
        <div class="watermark">
            <span><i class="fas fa-code me-2"></i>spycode</span>
        </div>
    </div>

    <script>
        (function() {
            // Data Storage
            let members = JSON.parse(localStorage.getItem('mealMembers')) || [
                { name: 'রাজু', mil: 50, extra: 100, joma: 2800 },
                { name: 'সুমি', mil: 42, extra: 0, joma: 2100 },
                { name: 'হাসান', mil: 38, extra: 250, joma: 2200 }
            ];

            function saveMembers() {
                localStorage.setItem('mealMembers', JSON.stringify(members));
            }

            function showStatus(message, type = 'success') {
                const status = document.getElementById('statusMsg');
                if (status) {
                    status.textContent = message;
                    status.classList.remove('d-none', 'alert-success', 'alert-danger');
                    
                    if (type === 'success') {
                        status.classList.add('alert', 'alert-success');
                    } else {
                        status.classList.add('alert', 'alert-danger');
                    }
                    
                    setTimeout(() => {
                        status.classList.add('d-none');
                    }, 3000);
                }
            }

            function updateOutputArea() {
                const outputDiv = document.getElementById('outputArea');
                if (!outputDiv) return;

                const mottaka = parseFloat(document.getElementById('mottaka')?.value) || 0;
                const motkhoroch = parseFloat(document.getElementById('motkhoroch')?.value) || 0;
                const motmil = parseFloat(document.getElementById('motmil')?.value) || 1;
                
                const milret = motmil ? motkhoroch / motmil : 0;
                const oboshisto = mottaka - motkhoroch;

                let totalJoma = 0, totalEx = 0;
                let memberRows = '';

                members.forEach(mem => {
                    const mil = parseFloat(mem.mil) || 0;
                    const extra = parseFloat(mem.extra) || 0;
                    const joma = parseFloat(mem.joma) || 0;
                    
                    const milKhoroch = milret * mil;
                    const totalCost = milKhoroch + extra;
                    const diff = joma - totalCost;

                    totalJoma += joma;
                    totalEx += totalCost;

                    let badgeClass = diff > 0 ? 'bg-success' : (diff < 0 ? 'bg-danger' : 'bg-secondary');
                    let signText = diff > 0 ? `পাবে ${diff.toFixed(2)}` : 
                                  (diff < 0 ? `দেবে ${Math.abs(diff).toFixed(2)}` : 'সমান');

                    memberRows += `<tr>
                        <td class="fw-bold">${mem.name}</td>
                        <td>${mil.toFixed(1)}</td>
                        <td>${extra.toFixed(1)}</td>
                        <td class="text-success fw-bold">${joma.toFixed(1)}</td>
                        <td>${milKhoroch.toFixed(1)}</td>
                        <td class="fw-bold">${totalCost.toFixed(1)}</td>
                        <td><span class="badge ${badgeClass} p-2">${signText}</span></td>
                    </tr>`;
                });

                const summaryHTML = `
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>👤 নাম</th>
                                    <th>🍚 মিল</th>
                                    <th>💸 অতিরিক্ত</th>
                                    <th>💰 জমা</th>
                                    <th>🥘 মিল খরচ</th>
                                    <th>💳 মোট খরচ</th>
                                    <th>📊 পাবে/দেবে</th>
                                </tr>
                            </thead>
                            <tbody>${memberRows || '<tr><td colspan="7" class="text-center py-5 text-muted">👥 কোনো সদস্য নেই<br><small>উপরের ফর্ম থেকে সদস্য যোগ করুন</small></td></tr>'}</tbody>
                        </table>
                    </div>
                    
                    <div class="summary-card mt-4">
                        <h3 class="fw-bold mb-4"><i class="fas fa-chart-pie me-2"></i>সমষ্টিগত হিসাব</h3>
                        <div class="row g-3">
                            <div class="col-6 col-md-4">
                                <div class="summary-item">
                                    <span>📈 মিল রেট</span>
                                    <span class="text-warning fw-bold">${milret.toFixed(2)} টাকা</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="summary-item">
                                    <span>💵 অবশিষ্ট</span>
                                    <span class="text-success fw-bold">${oboshisto.toFixed(2)} টাকা</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="summary-item">
                                    <span>👥 সদস্য</span>
                                    <span class="fw-bold">${members.length} জন</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="summary-item">
                                    <span>💰 মোট জমা</span>
                                    <span class="text-success fw-bold">${totalJoma.toFixed(2)} টাকা</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="summary-item">
                                    <span>💳 মোট খরচ</span>
                                    <span class="text-danger fw-bold">${totalEx.toFixed(2)} টাকা</span>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="summary-item total">
                                    <span class="fs-4">🏆 ম্যানেজারের ব্যালেন্স</span>
                                    <span class="fs-3 fw-bold ${totalJoma >= totalEx ? 'text-success' : 'text-danger'}">
                                        ${(totalJoma - totalEx).toFixed(2)} টাকা
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                outputDiv.innerHTML = summaryHTML;
                updateAdminTable();
            }

            function updateAdminTable() {
                const adminBody = document.getElementById('adminBody');
                if (!adminBody) return;

                let rows = '';
                members.forEach((mem, idx) => {
                    rows += `<tr>
                        <td class="fw-bold">${mem.name}</td>
                        <td>${mem.mil}</td>
                        <td>${mem.extra}</td>
                        <td class="text-success fw-bold">${mem.joma}</td>
                        <td>
                            <button class="btn btn-sm btn-info rounded-pill px-3 me-1" onclick="editMember(${idx})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-danger rounded-pill px-3" onclick="removeMember(${idx})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>`;
                });
                adminBody.innerHTML = rows || '<tr><td colspan="5" class="text-center py-4 text-muted">📝 কোনো সদস্য নেই</td></tr>';
            }

            // Global Functions
            window.addMember = function() {
                const name = document.getElementById('memName')?.value.trim();
                const mil = parseFloat(document.getElementById('memMil')?.value) || 0;
                const extra = parseFloat(document.getElementById('memExtra')?.value) || 0;
                const joma = parseFloat(document.getElementById('memJoma')?.value) || 0;

                if (!name) {
                    showStatus('❌ নাম লিখুন!', 'danger');
                    return;
                }

                members.push({ name, mil, extra, joma });
                saveMembers();
                
                document.getElementById('memName').value = '';
                document.getElementById('memMil').value = '';
                document.getElementById('memExtra').value = '';
                document.getElementById('memJoma').value = '';
                
                updateOutputArea();
                showStatus(`✅ ${name} সদস্য যোগ হয়েছে!`, 'success');
            };

            window.removeMember = function(index) {
                if (index >= 0 && index < members.length) {
                    const name = members[index].name;
                    members.splice(index, 1);
                    saveMembers();
                    updateOutputArea();
                    showStatus(`🗑️ ${name} সদস্য মুছে ফেলা হয়েছে`, 'success');
                }
            };

            window.clearAllMembers = function() {
                if (members.length === 0) return;
                if (confirm(`সমস্ত ${members.length} সদস্য মুছে ফেলবেন?\n\nএই কাজটি পুনরুদ্ধার করা যাবে না!`)) {
                    members = [];
                    saveMembers();
                    updateOutputArea();
                    showStatus('🗑️ সমস্ত সদস্য মুছে ফেলা হয়েছে', 'success');
                }
            };

            window.editMember = function(index) {
                const mem = members[index];
                if (!mem) return;
                
                document.getElementById('memName').value = mem.name;
                document.getElementById('memMil').value = mem.mil;
                document.getElementById('memExtra').value = mem.extra;
                document.getElementById('memJoma').value = mem.joma;
                
                if (confirm(`✏️ "${mem.name}" সম্পাদনা করতে চান?`)) {
                    members.splice(index, 1);
                    saveMembers();
                    updateOutputArea();
                }
            };

            window.downloadPNG = async function() {
                const outputArea = document.getElementById('outputArea');
                if (!outputArea) return;

                showStatus('⏳ PNG তৈরি হচ্ছে...', 'success');

                try {
                    const canvas = await html2canvas(outputArea, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        logging: false,
                        allowTaint: true,
                        useCORS: true
                    });

                    const link = document.createElement('a');
                    link.download = `মিল_ক্যালকুলেটর_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    showStatus('✅ PNG সফলভাবে ডাউনলোড হয়েছে!', 'success');
                } catch (err) {
                    showStatus('❌ ডাউনলোড ব্যর্থ!', 'danger');
                    console.error('PNG Error:', err);
                }
            };

            // Event Listeners
            ['mottaka', 'motkhoroch', 'motmil'].forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.addEventListener('input', updateOutputArea);
                }
            });

            // Initial Render
            updateOutputArea();
        })();
    </script>

    <!-- Bootstrap JS (optional, for better mobile interaction) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
