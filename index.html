<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>মিল ক্যালকুলেটর 📱💻 সবার জন্য</title>
    <!-- html2canvas (stable) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b2a41 0%, #164863 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 10px 25px 10px;
        }

        /* main container - fully responsive */
        .main-card {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35);
            padding: 20px 16px 28px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        @media (min-width: 600px) {
            .main-card { padding: 28px 24px; }
        }
        @media (min-width: 992px) {
            .main-card { padding: 35px 30px; }
        }

        h1 {
            color: #0c3150;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            text-align: center;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -0.5px;
            border-bottom: 3px dashed #2f6e9c;
            padding-bottom: 12px;
        }

        /* about button - mobile friendly */
        .about-link {
            display: inline-block;
            background: #ffb749;
            color: #0b263b;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1rem;
            margin-bottom: 20px;
            border: 2px solid #ffe6b0;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .about-link:hover {
            background: #ffa621;
            transform: translateY(-2px);
        }

        /* master grid - responsive */
        .master-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: #e2efff;
            padding: 20px 16px;
            border-radius: 28px;
            margin: 20px 0 18px 0;
            border: 1px solid #b6d0f0;
        }
        .master-item {
            flex: 1 1 140px;
            min-width: 130px;
        }
        .master-item label {
            display: block;
            font-weight: 700;
            color: #10316b;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }
        .master-item input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #c8d9fc;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
            border: 1px solid #90b4f0;
        }
        .master-item input:focus {
            border-color: #1f5cb0;
            outline: none;
            box-shadow: 0 0 0 3px rgba(31,92,176,0.2);
        }

        /* add member panel */
        .add-panel {
            background: #d7e8ff;
            border-radius: 32px;
            padding: 22px 16px;
            margin: 20px 0;
            border: 2px solid white;
        }
        .panel-title {
            font-size: 1.8rem;
            color: #0f2d4e;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .member-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .member-field {
            flex: 1 1 140px;
            min-width: 140px;
        }
        .member-field label {
            font-weight: 600;
            color: #0a2a4a;
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: block;
        }
        .member-field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 30px;
            border: 1px solid #adc6f0;
            background: white;
            font-size: 1rem;
        }
        .add-btn {
            background: #113e6b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 16px rgba(0,40,80,0.4);
            cursor: pointer;
            border: 2px solid #8fb4ff;
            transition: 0.2s;
            margin-top: 8px;
        }
        .add-btn:hover {
            background: #175697;
            transform: translateY(-2px);
        }

        /* header with download */
        .action-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin: 25px 0 18px 0;
        }
        .title-with-clear {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .title-with-clear h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #102b47;
        }
        .clear-btn {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .download-png-btn {
            background: #1f6e43;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 16px #0b3b1e60;
            cursor: pointer;
            border: 2px solid #b0e0b0;
        }

        /* ------- আউটপুট এরিয়া (শুধু এই অংশ PNG তে যাবে) ------- */
        #pngOutputArea {
            background: white;
            border-radius: 36px;
            padding: 22px 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            margin: 15px 0 20px 0;
            border: 2px solid #c0d4ff;
            width: 100%;
            overflow-x: auto;
        }

        /* টেবিল রেস্পন্সিভ */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 25px;
            border-radius: 28px;
            background: #eaf1fd;
            padding: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            min-width: 600px;  /* ছোট পর্দায় স্ক্রল আসবে, কিন্তু টেবিল থাকবে intact */
            font-size: 0.95rem;
        }
        th {
            background: #0d3870;
            color: white;
            padding: 16px 8px;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            padding: 14px 8px;
            border-bottom: 1px solid #cddfff;
            color: #11212e;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }

        /* summary box */
        .summary-box {
            background: linear-gradient(115deg, #082338, #1b4870);
            border-radius: 30px;
            padding: 20px 15px;
            color: white;
            margin-top: 15px;
        }
        .summary-box h3 {
            color: #ffd78c;
            font-size: 1.8rem;
            margin-bottom: 15px;
            border-left: 6px solid #ffae42;
            padding-left: 16px;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            font-size: 1rem;
            min-width: 300px;
        }
        .summary-table th {
            background: #f0a830;
            color: #162b40;
            padding: 12px 5px;
        }
        .summary-table td {
            color: #f0ebd8;
            border-bottom: 1px solid #4f7aa6;
            white-space: nowrap;
        }
        .grand-total {
            background: #031d32;
            font-weight: 800;
        }

        /* ওয়াটারমার্ক (spycode) */
        .watermark-wrapper {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 3px dashed #4f77a5;
        }
        .watermark-text {
            background: #0f2d4b;
            color: #dae6ff;
            padding: 8px 40px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            display: inline-block;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
        }

        /* admin panel (শুধু ওয়েবের জন্য) */
        .admin-panel {
            background: #eaf0fa;
            border-radius: 28px;
            padding: 20px 12px;
            margin: 25px 0 10px 0;
        }
        .admin-panel h3 {
            color: #0b2a4a;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .admin-table {
            overflow-x: auto;
            background: white;
            border-radius: 24px;
            padding: 5px;
        }
        .admin-table table {
            min-width: 500px;
        }
        .edit-btn {
            background: #1790a5;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            margin: 2px;
            font-weight: bold;
        }
        .remove-btn {
            background: #c73e4e;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            margin: 2px;
            font-weight: bold;
        }

        #downloadStatus {
            color: #11552b;
            background: #cbffd6;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
        }

        /* সবকিছু রেস্পন্সিভ */
        @media (max-width: 480px) {
            .master-item { min-width: 100%; }
            .member-field { min-width: 100%; }
            .add-btn { width: 100%; justify-content: center; }
            .download-png-btn { width: 100%; justify-content: center; }
            .watermark-text { font-size: 1.2rem; padding: 8px 20px; }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h1>🍽️ মিল ক্যালকুলেটর</h1>
            <a href="SAHED.html" class="about-link">📌 About Me (SAHED)</a>
        </div>

        <!-- মাস্টার ইনপুট -->
        <div class="master-grid">
            <div class="master-item"><label>💰 মোট টাকা</label><input type="number" id="mottaka" value="20000"></div>
            <div class="master-item"><label>🧾 মোট খরচ</label><input type="number" id="motkhoroch" value="15000"></div>
            <div class="master-item"><label>🍲 মোট মিল</label><input type="number" id="motmil" value="300"></div>
        </div>

        <!-- অ্যাড মেম্বার -->
        <div class="add-panel">
            <div class="panel-title"><span style="background:#113e6b; color:white; padding:5px 20px; border-radius:50px;">➕</span> নতুন সদস্য</div>
            <div class="member-inputs">
                <div class="member-field"><label>নাম</label><input type="text" id="memName" placeholder="রাজু"></div>
                <div class="member-field"><label>মিল</label><input type="number" id="memMil" placeholder="45"></div>
                <div class="member-field"><label>অতিরিক্ত</label><input type="number" id="memExtra" placeholder="200"></div>
                <div class="member-field"><label>জমা</label><input type="number" id="memJoma" placeholder="3500"></div>
                <button class="add-btn" onclick="addMember()">✅ যোগ করুন</button>
            </div>
        </div>

        <!-- হেডার ও ডাউনলোড বাটন -->
        <div class="action-header">
            <div class="title-with-clear">
                <h2>📋 সদস্য তালিকা</h2>
                <button class="clear-btn" onclick="clearAllMembers()">🗑️ সব মুছুন</button>
            </div>
            <button class="download-png-btn" onclick="downloadPNG()">📥 PNG ডাউনলোড</button>
        </div>

        <!-- এই অংশটুকুই PNG তে যাবে (শুধু আউটপুট) -->
        <div id="pngOutputArea">
            <!-- মেম্বার টেবিল -->
            <div class="table-responsive">
                <table id="memberTable">
                    <thead><tr><th>নাম</th><th>মোট মিল</th><th>অতিরিক্ত</th><th>জমা</th><th>মিল খরচ</th><th>মোট খরচ</th><th>পাবে/দেবে</th></tr></thead>
                    <tbody id="memberTableBody"></tbody>
                </table>
            </div>

            <!-- সমষ্টিগত সারাংশ -->
            <div class="summary-box">
                <h3>📊 সমষ্টিগত হিসাব</h3>
                <table class="summary-table">
                    <thead><tr><th>বিবরণ</th><th>মান</th></tr></thead>
                    <tbody id="summaryBody">
                        <tr><td>মিল রেট</td><td id="rateShow">-</td></tr>
                        <tr><td>অবশিষ্ট টাকা</td><td id="oboshistoShow">-</td></tr>
                        <tr><td>মোট সদস্য</td><td id="totalMembersShow">0</td></tr>
                        <tr><td>মোট জমা</td><td id="totalJomaShow">0</td></tr>
                        <tr><td>মোট খরচ (মিল+অতি)</td><td id="totalExShow">0</td></tr>
                        <tr class="grand-total"><td>ম্যানেজার পাবে/দেবে</td><td id="managerBalanceShow">0</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- spycode ওয়াটারমার্ক (দৃশ্যমান) -->
            <div class="watermark-wrapper">
                <span class="watermark-text">🔍 spycode</span>
            </div>
        </div>
        <!-- PNG আউটপুট শেষ -->

        <!-- স্ট্যাটাস মেসেজ -->
        <div id="downloadStatus"></div>

        <!-- অ্যাডমিন প্যানেল (শুধু এডিট/রিমুভ, PNG তে থাকবে না) -->
        <div class="admin-panel">
            <h3>⚙️ সদস্য ব্যবস্থাপনা (এডিট/রিমুভ)</h3>
            <div class="admin-table">
                <table>
                    <thead><tr><th>নাম</th><th>মিল</th><th>অতিরিক্ত</th><th>জমা</th><th>অ্যাকশন</th></tr></thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let members = [];

            // ইনপুট এলিমেন্ট
            const mottakaInp = document.getElementById('mottaka');
            const motkhorochInp = document.getElementById('motkhoroch');
            const motmilInp = document.getElementById('motmil');
            const nameInp = document.getElementById('memName');
            const milInp = document.getElementById('memMil');
            const extraInp = document.getElementById('memExtra');
            const jomaInp = document.getElementById('memJoma');

            const tbody = document.getElementById('memberTableBody');
            const adminBody = document.getElementById('adminTableBody');

            function getBase() {
                const mottaka = parseFloat(mottakaInp.value) || 0;
                const motkhoroch = parseFloat(motkhorochInp.value) || 0;
                const motmil = parseFloat(motmilInp.value) || 1;
                return {
                    mottaka, motkhoroch, motmil,
                    oboshisto: mottaka - motkhoroch,
                    milret: motmil ? motkhoroch / motmil : 0
                };
            }

            function refreshAll() {
                const base = getBase();
                const milret = base.milret;
                let totalJoma = 0, totalEx = 0;
                let rows = '', adminRows = '';

                members.forEach((mem, idx) => {
                    const mil = parseFloat(mem.mil) || 0;
                    const extra = parseFloat(mem.extra) || 0;
                    const joma = parseFloat(mem.joma) || 0;
                    const milKhoroch = milret * mil;
                    const totalCost = milKhoroch + extra;
                    const diff = joma - totalCost;

                    totalJoma += joma;
                    totalEx += totalCost;

                    let sign = diff > 0 ? `${mem.name} পাবে ${diff.toFixed(2)} টাকা` : (diff < 0 ? `ম্যানেজার পাবে ${Math.abs(diff).toFixed(2)} টাকা` : 'সমান ০');

                    rows += `<tr><td>${mem.name}</td><td>${mil.toFixed(2)}</td><td>${extra.toFixed(2)}</td><td>${joma.toFixed(2)}</td><td>${milKhoroch.toFixed(2)}</td><td>${totalCost.toFixed(2)}</td><td>${sign}</td></tr>`;

                    adminRows += `<tr><td>${mem.name}</td><td>${mil}</td><td>${extra}</td><td>${joma}</td><td><button class="edit-btn" onclick="editMember(${idx})">সম্পাদনা</button><button class="remove-btn" onclick="removeMember(${idx})">মুছুন</button></td></tr>`;
                });

                tbody.innerHTML = rows || '<tr><td colspan="7" style="text-align:center; padding:25px;">👥 কোনো সদস্য নেই</td></tr>';
                adminBody.innerHTML = adminRows || '<tr><td colspan="5" style="text-align:center;">কোনো সদস্য নেই</td></tr>';

                document.getElementById('rateShow').innerText = milret.toFixed(2);
                document.getElementById('oboshistoShow').innerText = base.oboshisto.toFixed(2);
                document.getElementById('totalMembersShow').innerText = members.length;
                document.getElementById('totalJomaShow').innerText = totalJoma.toFixed(2);
                document.getElementById('totalExShow').innerText = totalEx.toFixed(2);
                document.getElementById('managerBalanceShow').innerText = (totalJoma - totalEx).toFixed(2) + ' টাকা';
            }

            window.addMember = function() {
                const name = nameInp.value.trim() || 'অতিথি';
                const mil = parseFloat(milInp.value);
                const extra = parseFloat(extraInp.value);
                const joma = parseFloat(jomaInp.value);
                if (isNaN(mil) || mil<0 || isNaN(extra) || extra<0 || isNaN(joma) || joma<0) {
                    alert('সঠিক সংখ্যা দিন (ঋণাত্মক নয়)'); return;
                }
                members.push({ name, mil, extra, joma });
                nameInp.value = ''; milInp.value = ''; extraInp.value = ''; jomaInp.value = '';
                refreshAll();
            };

            window.removeMember = function(i) {
                if (i>=0 && i<members.length) { members.splice(i,1); refreshAll(); }
            };

            window.clearAllMembers = function() {
                if (members.length && confirm('সব মুছবেন?')) { members = []; refreshAll(); }
            };

            window.editMember = function(i) {
                const m = members[i];
                if (!m) return;
                nameInp.value = m.name; milInp.value = m.mil; extraInp.value = m.extra; jomaInp.value = m.joma;
                if (confirm('এডিট করতে সরিয়ে পুনরায় যোগ করুন')) {
                    members.splice(i,1); refreshAll();
                }
            };

            // ইনপুট লিসেনার
            [mottakaInp, motkhorochInp, motmilInp].forEach(el => el.addEventListener('input', refreshAll));

            // ডেমো ডাটা
            if (!members.length) {
                members.push({ name:'রাজু', mil:50, extra:100, joma:2800 });
                members.push({ name:'সুমি', mil:42, extra:0, joma:2100 });
                members.push({ name:'হাসান', mil:38, extra:250, joma:2200 });
                refreshAll();
            }

            // PNG ডাউনলোড (শুধু আউটপুট এলাকা)
            window.downloadPNG = function() {
                const area = document.getElementById('pngOutputArea');
                const status = document.getElementById('downloadStatus');
                status.innerText = '⏳ PNG তৈরী হচ্ছে (spycode ওয়াটারমার্ক)...';

                html2canvas(area, {
                    scale: 2.2,           // হাই-রেজোলিউশন, মোবাইল ও ডেস্কটপের জন্য তীক্ষ্ণ
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: true,
                    useCORS: true
                }).then(canvas => {
                    // অতিরিক্ত তির্যক spycode ওয়াটারমার্ক (ক্যানভাসে)
                    const ctx = canvas.getContext('2d');
                    ctx.font = 'bold 28px "Segoe UI", Arial, sans-serif';
                    ctx.fillStyle = 'rgba(150, 170, 200, 0.23)';
                    ctx.rotate(-0.18);
                    ctx.fillText('spycode', 180, canvas.height - 50);
                    ctx.rotate(0.18);

                    const link = document.createElement('a');
                    link.download = 'meal_spycode.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    status.innerText = '✅ ডাউনলোড সম্পন্ন (spycode ওয়াটারমার্ক সহ)';
                    setTimeout(() => status.innerText = '', 3000);
                }).catch(e => { status.innerText = '❌ ব্যর্থ'; console.error(e); });
            };

            refreshAll(); // নিশ্চিত
        })();
    </script>
</body>
</html>
