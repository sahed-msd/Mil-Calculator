            function updateOutputArea() {
                const outputDiv = document.getElementById('outputArea');
                if (!outputDiv) return;

                const mottaka = parseFloat(document.getElementById('mottaka')?.value) || 0;
                const motkhoroch = parseFloat(document.getElementById('motkhoroch')?.value) || 0;
                const motmil = parseFloat(document.getElementById('motmil')?.value) || 1;

                    const totalCost = milKhoroch + extra;
                    const diff = joma - totalCost;

                    totalJoma += joma;
                    totalEx += totalCost;

                    let signText = diff > 0 ? `✅ ${mem.name} পাবে ${diff.toFixed(2)}` : 
                                  (diff < 0 ? `❌ ${mem.name} দেবে ${Math.abs(diff).toFixed(2)}` : '⚖️ সমান');

                    memberRows += `<tr>
                        <td style="font-weight: 800; color: #0c3253;">${mem.name}</td>
                        <td>${mil.toFixed(1)}</td>
                        <td>${extra.toFixed(1)}</td>
                        <td style="font-weight: 800; color: #1d6e41;">${joma.toFixed(1)}</td>
                        <td style="color: #1a5cb0; font-weight: 700;">${milKhoroch.toFixed(1)}</td>
                        <td style="background: #fff3cd; font-weight: 700;">${totalCost.toFixed(1)}</td>
                        <td style="font-size: 1.1rem; font-weight: 900;">${signText}</td>
                    </tr>`;
                });

                const summaryHTML = `
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>👤 নাম</th>
                                    <th>🍚 মিল</th>
                                    <th>💸 অতিরিক্ত</th>
                                    <th>💰 জমা</th>
                                    <th>🥘 মিল খরচ</th>
                                    <th>💳 মোট খরচ</th>
                                    <th>📊 পাবে/দেবে</th>
                                </tr>
                            </thead>
                            <tbody>${memberRows || '<tr><td colspan="7" style="text-align:center; padding:60px; font-size:1.5rem; color:#6c757d;"><span>👥 কোনো সদস্য নেই</span><br><small>উপরের ফর্ম থেকে সদস্য যোগ করুন</small></td></tr>'}</tbody>
                        </table>
                    </div>
                    <div class="summary-card">
                        <h3>📊 সমষ্টিগত হিসাব</h3>
                        <div class="summary-grid">
                            <div class="summary-item"><span>📈 মিল রেট</span><span style="color:#ffda99;">${milret.toFixed(2)} টাকা</span></div>
                            <div class="summary-item"><span>💵 অবশিষ্ট টাকা</span><span style="color:#28a745;">${oboshisto.toFixed(2)} টাকা</span></div>
                            <div class="summary-item"><span>👥 মোট সদস্য</span><span>${members.length} জন</span></div>
                            <div class="summary-item"><span>💰 মোট জমা</span><span style="color:#1d6e41;">${totalJoma.toFixed(2)} টাকা</span></div>
                            <div class="summary-item"><span>💳 মোট খরচ</span><span style="color:#dc3545;">${totalEx.toFixed(2)} টাকা</span></div>
                            <div class="summary-item total">
                                <span>🏆 ম্যানেজারের ব্যালেন্স</span>
                                <span style="color: ${totalJoma >= totalEx ? '#28a745' : '#dc3545'}; font-size: 1.8rem;">
                                    ${totalJoma >= totalEx ? '✅' : '❌'} ${(totalJoma - totalEx).toFixed(2)} টাকা
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="watermark">
                        <span>🔍 Made with ❤️ by spycode</span>
                    </div>
                `;

                outputDiv.innerHTML = summaryHTML;
                updateAdminTable();
            }

            function updateAdminTable() {
                const adminBody = document.getElementById('adminBody');
                if (!adminBody) return;

                let rows = '';
                members.forEach((mem, idx) => {
                    rows += `<tr>
                        <td style="font-weight: 800;">${mem.name}</td>
                        <td>${mem.mil}</td>
                        <td>${mem.extra}</td>
                        <td style="color: #1d6e41; font-weight: 700;">${mem.joma}</td>
                        <td>
                            <button class="edit-btn" onclick="editMember(${idx})">✏️ সম্পাদনা</button>
                            <button class="rm-btn" onclick="removeMember(${idx})">🗑️ মুছুন</button>
                        </td>
                    </tr>`;
                });
                adminBody.innerHTML = rows || '<tr><td colspan="5" style="text-align:center; padding:30px; color:#6c757d; font-size:1.2rem;">📝 কোনো সদস্য নেই</td></tr>';
            }

            // গ্লোবাল ফাংশনস
            window.addMember = function() {
                const name = document.getElementById('memName')?.value.trim() || 'অতিথি';
                const mil = parseFloat(document.getElementById('memMil')?.value) || 0;
                const extra = parseFloat(document.getElementById('memExtra')?.value) || 0;
                const joma = parseFloat(document.getElementById('memJoma')?.value) || 0;

                if (!name || mil < 0 || extra < 0 || joma < 0) {
                    showStatus('❌ সঠিক তথ্য দিন!', 'error');
                    return;
                }

                members.push({ name, mil, extra, joma });
                saveMembers();
                
                // ফিল্ড ক্লিয়ার
                document.getElementById('memName').value = '';
                document.getElementById('memMil').value = '';
                document.getElementById('memExtra').value = '';
                document.getElementById('memJoma').value = '';
                
                updateOutputArea();
                showStatus(`✅ ${name} সদস্য যোগ হয়েছে!`, 'success');
            };

            window.removeMember = function(index) {
                if (index >= 0 && index < members.length) {
                    const name = members[index].name;
                    members.splice(index, 1);
                    saveMembers();
                    updateOutputArea();
                    showStatus(`🗑️ ${name} সদস্য মুছে ফেলা হয়েছে`, 'success');
                }
            };

            window.clearAllMembers = function() {
                if (members.length === 0) return;
                if (confirm(`সমস্ত ${members.length} সদস্য মুছে ফেলবেন?\n\nএই কাজটি পুনরুদ্ধার করা যাবে না!`)) {
                    members = [];
                    saveMembers();
                    updateOutputArea();
                    showStatus('🗑️ সমস্ত সদস্য মুছে ফেলা হয়েছে', 'success');
                }
            };

            window.editMember = function(index) {
                const mem = members[index];
                if (!mem) return;
                
                document.getElementById('memName').value = mem.name;
                document.getElementById('memMil').value = mem.mil;
                document.getElementById('memExtra').value = mem.extra;
                document.getElementById('memJoma').value = mem.joma;
                
                if (confirm(`✏️ "${mem.name}" সম্পাদনা করতে:\n1. প্রথমে "মুছুন" বাটন চাপুন\n2. তারপর নতুন করে যোগ করুন\n\nএখনই মুছে ফেলবেন?`)) {
                    members.splice(index, 1);
                    saveMembers();
                    updateOutputArea();
                }
            };

            window.downloadPNG = async function() {
                const outputArea = document.getElementById('outputArea');
                const status = document.getElementById('statusMsg');
                if (!outputArea) return;

                status.textContent = '⏳ PNG তৈরি হচ্ছে...';
                status.classList.add('loading');

                try {
                    const canvas = await html2canvas(outputArea, {
                        scale: window.devicePixelRatio > 1 ? 2.5 : 2,
                        backgroundColor: '#ffffff',
                        width: outputArea.scrollWidth,
                        height: outputArea.scrollHeight,
                        logging: false,
                        allowTaint: true,
                        useCORS: true,
                        scrollX: 0,
                        scrollY: 0
                    });

                    // spycode ওয়াটারমার্ক যোগ করা
                    const ctx = canvas.getContext('2d');
                    ctx.save();
                    ctx.translate(canvas.width * 0.1, canvas.height * 0.92);
                    ctx.rotate(-0.08);
                    ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
                    ctx.fillStyle = 'rgba(15, 49, 83, 0.15)';
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 10;
                    ctx.fillText('🔍 spycode', 0, 0);
                    ctx.restore();

                    const link = document.createElement('a');
                    link.download = `মিল_ক্যালকুলেটর_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    status.textContent = '✅ PNG সফলভাবে ডাউনলোড হয়েছে!';
                    status.classList.remove('loading');
                    status.style.background = 'linear-gradient(45deg, #d4edda, #c3e6cb)';
                    
                    setTimeout(() => {
                        status.textContent = '';
                        status.style.background = '';
                    }, 4000);
                } catch (err) {
                    status.textContent = '❌ ডাউনলোড ব্যর্থ! আবার চেষ্টা করুন';
                    status.classList.remove('loading');
                    status.style.background = 'linear-gradient(45deg, #f8d7da, #f5c6cb)';
                    console.error('PNG Error:', err);
                }
            };

            function showStatus(message, type = 'info') {
                const status = document.getElementById('statusMsg');
                if (status) {
                    status.textContent = message;
                    status.style.background = type === 'success' ? 
                        'linear-gradient(45deg, #d3f0da, #c8e6c9)' : 
                        'linear-gradient(45deg, #f8d7da, #f5c6cb)';
                    setTimeout(() => {
                        status.textContent = '';
                        status.style.background = '';
                    }, 3000);
                }
            }

            // ইনিশিয়াল রেন্ডার
            renderApp();

            // রিসাইজ হ্যান্ডলার
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(renderApp, 300);
            });

        })();
    </script>
</body>
</html>
