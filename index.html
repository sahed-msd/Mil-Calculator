<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মিল ক্যালকুলেটর</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#0b263b;padding:20px;display:flex;justify-content:center}
.container{width:100%;max-width:1100px;background:#fff;border-radius:30px;padding:25px}

h1{margin-bottom:20px}
.card{background:#f3f7ff;padding:20px;border-radius:20px;margin-bottom:20px}

input{padding:10px;border-radius:30px;border:1px solid #ccc;width:100%}
button{padding:10px 20px;border-radius:30px;border:none;font-weight:bold;cursor:pointer}

.add-btn{background:#134579;color:#fff}
.clear-btn{background:#c43e4f;color:#fff}
.download-btn{background:#1d6e41;color:#fff}

table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{padding:8px;border:1px solid #ddd;text-align:center}
th{background:#0e3b70;color:#fff}

.summary{margin-top:20px;padding:15px;background:#082b4a;color:#fff;border-radius:20px}

.admin{margin-top:20px}

.status{margin-top:10px;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h1>🍚 মিল ক্যালকুলেটর</h1>

<div class="card">
মোট টাকা: <input type="number" id="mottaka" value="25000"><br><br>
মোট খরচ: <input type="number" id="motkhoroch" value="18000"><br><br>
মোট মিল: <input type="number" id="motmil" value="360">
</div>

<div class="card">
<h3>নতুন সদস্য</h3><br>
নাম <input type="text" id="memName"><br><br>
মিল <input type="number" id="memMil"><br><br>
অতিরিক্ত <input type="number" id="memExtra"><br><br>
জমা <input type="number" id="memJoma"><br><br>
<button class="add-btn" onclick="addMember()">যোগ করুন</button>
</div>

<button class="clear-btn" onclick="clearAll()">সব মুছুন</button>
<button class="download-btn" onclick="downloadPNG()">PNG ডাউনলোড</button>

<div id="output"></div>
<div class="status" id="status"></div>

<div class="admin">
<h3>এডিট / রিমুভ</h3>
<table>
<thead>
<tr><th>নাম</th><th>মিল</th><th>অতি</th><th>জমা</th><th>অ্যাকশন</th></tr>
</thead>
<tbody id="adminBody"></tbody>
</table>
</div>

</div>

<script>

let members = JSON.parse(localStorage.getItem("members")) || [
{name:'রাজু',mil:50,extra:100,joma:2800},
{name:'সুমি',mil:42,extra:0,joma:2100},
{name:'হাসান',mil:38,extra:250,joma:2200}
];

function saveData(){
localStorage.setItem("members",JSON.stringify(members));
}

function update(){

let mottaka = Number(mottakaInput.value)||0;
let motkhoroch = Number(motkhorochInput.value)||0;
let motmil = Number(motmilInput.value)||0;

let milRate = motmil>0 ? motkhoroch/motmil : 0;

let totalJoma=0;
let totalCostAll=0;
let rows="";

members.forEach((m,i)=>{

let milCost = milRate * m.mil;
let totalCost = milCost + m.extra;
let diff = m.joma - totalCost;

totalJoma+=m.joma;
totalCostAll+=totalCost;

let status="";
if(diff>0) status=`পাবে ${diff.toFixed(2)}`;
else if(diff<0) status=`দেবে ${Math.abs(diff).toFixed(2)}`;
else status="সমান";

rows+=`
<tr>
<td>${m.name}</td>
<td>${m.mil}</td>
<td>${m.extra}</td>
<td>${m.joma}</td>
<td>${milCost.toFixed(2)}</td>
<td>${totalCost.toFixed(2)}</td>
<td>${status}</td>
</tr>
`;

});

let managerDiff = totalJoma - totalCostAll;
let managerText = managerDiff>0 ?
`ম্যানেজার পাবে ${managerDiff.toFixed(2)}` :
managerDiff<0 ?
`ম্যানেজার দেবে ${Math.abs(managerDiff).toFixed(2)}` :
"সমান";

output.innerHTML=`
<table>
<thead>
<tr>
<th>নাম</th>
<th>মিল</th>
<th>অতিরিক্ত</th>
<th>জমা</th>
<th>মিল খরচ</th>
<th>মোট খরচ</th>
<th>পাবে/দেবে</th>
</tr>
</thead>
<tbody>
${rows || '<tr><td colspan="7">কোনো সদস্য নেই</td></tr>'}
</tbody>
</table>

<div class="summary">
মিল রেট: ${milRate.toFixed(2)} <br>
মোট জমা: ${totalJoma.toFixed(2)} <br>
মোট খরচ: ${totalCostAll.toFixed(2)} <br>
${managerText}
</div>
`;

updateAdmin();
saveData();
}

function updateAdmin(){
let html="";
members.forEach((m,i)=>{
html+=`
<tr>
<td>${m.name}</td>
<td>${m.mil}</td>
<td>${m.extra}</td>
<td>${m.joma}</td>
<td>
<button onclick="editMember(${i})">এডিট</button>
<button onclick="removeMember(${i})">মুছুন</button>
</td>
</tr>`;
});
adminBody.innerHTML=html || "<tr><td colspan='5'>কেউ নেই</td></tr>";
}

function addMember(){

let name=memName.value.trim()||"অতিথি";
let mil=Number(memMil.value);
let extra=Number(memExtra.value);
let joma=Number(memJoma.value);

if(isNaN(mil)||isNaN(extra)||isNaN(joma)||mil<0||extra<0||joma<0){
alert("সঠিক সংখ্যা দিন");
return;
}

members.push({name,mil,extra,joma});

memName.value="";
memMil.value="";
memExtra.value="";
memJoma.value="";

update();
}

function removeMember(i){
members.splice(i,1);
update();
}

function editMember(i){
let m=members[i];
memName.value=m.name;
memMil.value=m.mil;
memExtra.value=m.extra;
memJoma.value=m.joma;
members.splice(i,1);
update();
}

function clearAll(){
if(confirm("সব মুছবেন?")){
members=[];
update();
}
}

function downloadPNG(){
status.innerText="PNG তৈরি হচ্ছে...";

html2canvas(output).then(canvas=>{
let ctx=canvas.getContext("2d");
ctx.save();
ctx.globalAlpha=0.2;
ctx.font="30px Arial";
ctx.rotate(-0.2);
ctx.fillText("spycode",200,canvas.height-80);
ctx.restore();

let link=document.createElement("a");
link.download="meal.png";
link.href=canvas.toDataURL();
link.click();

status.innerText="ডাউনলোড সম্পন্ন";
setTimeout(()=>status.innerText="",3000);
});
}

const mottakaInput=document.getElementById("mottaka");
const motkhorochInput=document.getElementById("motkhoroch");
const motmilInput=document.getElementById("motmil");

mottakaInput.oninput=update;
motkhorochInput.oninput=update;
motmilInput.oninput=update;

update();

</script>

</body>
</html>
